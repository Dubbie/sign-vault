name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea for SignVault? Describe what you'd like and why it would be useful.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API (Laravel backend)
        - Frontend (Vue app)
        - Landing page
        - Other / unsure
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation that prompted this request.
      placeholder: e.g. When I have 200 signs in a folder, there's no way to search by name.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Be as specific or as broad as you like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about, or workarounds you currently use.
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, examples from other apps, or anything else.
    validations:
      required: false
